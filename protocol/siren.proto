syntax = "proto3";

package ank.v1.siren;

// ----------------------------------------------------------------------------
// SIREN PROTOCOL: Cognitive Sensing & Voice Streaming
// ----------------------------------------------------------------------------

message AudioChunk {
  uint64 sequence_number = 1;
  bytes data = 2; // Raw PCM o Opus
  string format = 3; // "pcm_16khz_16bit" | "opus"
  uint32 sample_rate = 4;
}

message SirenEvent {
  string event_type = 1; // "VAD_START", "VAD_END", "ERROR"
  string message = 2;
  uint64 processed_sequence_number = 3;
}

service SirenService {
  rpc SirenStream (stream AudioChunk) returns (stream SirenEvent);
}
