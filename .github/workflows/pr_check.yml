name: SRE Firewall - Pull Request Guard (Shell)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-audit:
    name: Backend Audit (FastAPI - SRE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bff

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "bff/requirements.txt"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest

      - name: Syntax Check (Flake8 - El Gatillero)
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format Check (Black)
        run: black --check .

      - name: Critical Tests (Pytest)
        run: pytest --maxfail=1 --disable-warnings

  frontend-audit:
    name: Frontend Audit (React/Vite - SRE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Linting Check (ESLint)
        run: npm run lint

      - name: Production Build Check
        run: npm run build
