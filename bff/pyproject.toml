[tool.black]
line-length = 88
target-version = ["py310", "py311"]
# Exclude auto-generated protobuf files from Black formatting.
# These files are produced by `grpc_tools.protoc` and must not be reformatted
# as doing so would break the protobuf runtime ABI and corrupt CI checks.
extend-exclude = '''
(
  .*_pb2\.py
  | .*_pb2_grpc\.py
)
'''

[tool.flake8]
# Exclude auto-generated protobuf stubs from Flake8 linting.
# These files contain patterns (long lines, unused imports) that are
# expected output from the protoc compiler and are not maintainer code.
exclude = [
    "*_pb2.py",
    "*_pb2_grpc.py",
]
max-line-length = 88
